<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<section id="hero" class="hero-section py-5">
    <div class="container">
        <div class="row align-items-center" style="min-height: 80vh;">
            
            <div class="col-lg-7 text-start">
                <p class="text-cardinal mb-2" style="font-size: 1.2rem; letter-spacing: 2px; font-weight: bold;">Hi, my name is</p>
                
                <h1 class="display-1 fw-bold mb-3 text-white">
                    {{ .Site.Params.name }}
                </h1>
                
                <h2 class="display-4 text-light opacity-75 mb-4" style="font-weight: 600;">
                    I find answers to clinical research questions.
                </h2>
                
                <div class="mb-5" style="max-width: 600px;">
                    <p class="lead text-light opacity-90">
                        {{ .Site.Params.bio }}
                    </p>
                </div>
                
                <div class="d-flex flex-wrap align-items-center gap-3">
                    
                    <a href="{{ .Site.Params.resume_url | relURL }}" target="_blank" class="btn btn-cardinal btn-lg px-4 shadow-sm">
                        <i class="fas fa-file-pdf me-2"></i>Resume
                    </a>

                    <div class="d-flex gap-2">
                        <a href="https://github.com/{{ .Site.Params.github }}" target="_blank" class="social-circle-icon" title="GitHub">
                            <i class="fa-brands fa-github"></i>
                        </a>
                        <a href="https://x.com/{{ .Site.Params.twitter }}" target="_blank" class="social-circle-icon" title="X">
                            <i class="fa-brands fa-x-twitter"></i>
                        </a>
                    </div>

                    <a href="https://scholar.google.com/citations?user=So6NDwMAAAAJ&hl=en" class="btn btn-outline-light btn-lg px-4">
                        <i class="fas fa-graduation-cap me-2"></i>Publications
                    </a>

                    <a href="mailto:{{ .Site.Params.email }}" class="btn btn-link text-decoration-none text-white fw-bold px-0 ms-md-2">
                        Get in Touch <i class="fas fa-arrow-right ms-1 text-cardinal"></i>
                    </a>
                </div>
            </div>

            <div class="col-lg-5 text-center mt-5 mt-lg-0">
                <img src="{{ "/images/dangomez Apple Playground.jpeg" | relURL }}" 
                     alt="Daniel Gomez" 
                     class="img-fluid rounded shadow-lg" 
                     style="width: 100%; max-width: 450px; aspect-ratio: 1 / 1; object-fit: cover; border: 10px solid #fff;">
            </div>

        </div>
    </div>
</section>

<style>
    :root { --stanford-red: #8C1515; }
    .text-cardinal { color: var(--stanford-red) !important; }

    .social-circle-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background-color: #ffffff;
        color: #232323; 
        border: 1px solid #dee2e6;
        font-size: 1.5rem;
        transition: all 0.3s ease;
        text-decoration: none;
    }

    .social-circle-icon:hover {
        background-color: var(--stanford-red);
        color: white;
        border-color: var(--stanford-red);
        transform: translateY(-3px);
    }

    .btn-cardinal {
        background-color: var(--stanford-red) !important;
        border-color: var(--stanford-red) !important;
        color: white !important;
    }

    .btn-cardinal:hover {
        background-color: #701111 !important;
        transform: translateY(-2px);
    }

    .btn-link:hover {
        color: #ffffff !important;
        text-shadow: 0 0 8px rgba(255,255,255,0.3);
    }
</style>
